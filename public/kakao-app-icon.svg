<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144" width="144" height="144" role="img" aria-label="프롬프트 한국">
  <!-- 배경 — 사이트 메인 컬러 emerald + 미세 그라데이션 -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>
  <rect width="144" height="144" rx="32" fill="url(#bg)"/>

  <!-- ㅍ (프롬프트 P) — 흰색 -->
  <g fill="#ffffff">
    <!-- 상단 가로 막대 -->
    <rect x="28" y="36" width="88" height="14" rx="4"/>
    <!-- 좌측 세로 -->
    <rect x="42" y="50" width="14" height="44" rx="3"/>
    <!-- 우측 세로 -->
    <rect x="88" y="50" width="14" height="44" rx="3"/>
    <!-- 하단 가로 막대 -->
    <rect x="28" y="94" width="88" height="14" rx="4"/>
  </g>
</svg>
